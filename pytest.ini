[pytest]
# 用例匹配规则
testpaths = test_cases
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 修正addopts参数格式（核心：-n auto → -n=auto）
addopts = -s --alluredir=./allure-results --clean-alluredir
          --reruns=1 --reruns-delay=2
          # -n=auto  # 失败重试1次，间隔2秒，并行执行

# 编码配置
python_files_encoding = utf-8

# 用例标记
markers =
    base: 基础模块用例
    bill: 账单管理用例
    payment: 支付管理用例
    self_system: 自研系统对接用例（优先执行）
    third_party: 第三方接入用例（次要执行）
    critical: 关键用例
    normal: 普通用例

# 测试报告编码
reportencoding = utf-8